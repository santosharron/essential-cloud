<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dockerized App</title>
    <!-- Importing Tailwind CSS for industry-standard modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased">
    
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <main class="max-w-2xl w-full text-center">
            
            <!-- Main Content Card -->
            <div class="bg-white shadow-xl rounded-2xl p-10 border border-gray-200">
                
                <!-- Icon -->
                <div class="flex justify-center mb-6">
                    <svg class="h-16 w-16 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
                
                <!-- Headline -->
                <h1 class="text-4xl font-extrabold tracking-tight text-gray-900 sm:text-5xl mb-4">
                    Hello, Dockerized World!
                </h1>
                
                <!-- Subtitle -->
                <p class="text-lg text-gray-500 mb-8">
                    This is a modern, responsive web application running smoothly inside a Docker container.
                </p>
                
                <!-- Status Badges -->
                <div class="flex flex-wrap justify-center gap-4">
                    <span class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-green-600">
                        <span class="w-2 h-2 mr-2 bg-white rounded-full animate-pulse"></span>
                        System Online
                    </span>
                    <span class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white">
                        Port 3000
                    </span>
                </div>

            </div>
        </main>

        <!-- Footer -->
        <footer class="mt-12 text-center text-sm text-gray-400">
            &copy; 2026 Containerized App. Built with Flask & Tailwind CSS.
        </footer>
    </div>

</body>
</html>
