apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-web-app
      color: green
  template:
    metadata:
      labels:
        app: simple-web-app
        color: green
    spec:
      containers:
      - name: web-container
        image: santoshvp/essential-cloud-app:latest 
        ports:
        - containerPort: 3000